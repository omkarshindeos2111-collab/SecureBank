<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureBank Login</title>

*{
    box-sizing: border-box;
}

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px; /* prevents edge sticking on mobile */
}

/* Login container */
.login-container{
    background:white;
    padding:30px;
    width:90%;
    max-width:400px;  /* instead of fixed 350px */
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

/* Bank logo/title */
.bank-title{
    font-size:26px;
    font-weight:bold;
    color:#1e3a8a;
    margin-bottom:10px;
}

/* Subtitle */
.subtitle{
    color:#555;
    margin-bottom:25px;
    font-size:14px;
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    background:#1e3a8a;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#163080;
}

/* Footer */
.footer{
    margin-top:20px;
    font-size:12px;
    color:#888;
}

/* Extra mobile tuning */
@media (max-width:480px){
    .login-container{
        padding:30px 20px;
    }
}

</style>

</head>

<body>

<div class="login-container">

<div class="bank-title">
🏦 SecureBank
</div>

<div class="subtitle">
Secure Login to Your Account
</div>

<form method="POST" action="/login">

<input
type="text"
name="username"
placeholder="Enter Username"
required
>

<input
type="password"
name="password"
placeholder="Enter Password"
required
>

<button type="submit">
Login
</button>

<br><br>

<a href="/signup">
<button type="button"
style="background:#059669;">
Create New Account
</button>
</a>

</form>

<div class="footer">
© 2026 SecureBank. All rights reserved.
</div>

</div>

</body>
</html>
