<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create SecureBank Account</title>

<style>

*{
    box-sizing: border-box;
}

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;  /*prevents edge sticking on mobile */
}

.signup-container{
    background:white;
    padding:30px;
    width: 100%;
    max-width: 420px;
    border-radius:16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

input{

width:100%;
padding:12px;
margin:10px 0;
}

button{

width:100%;
padding:12px;
background:#1e3a8a;
color:white;
border:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>🏦 Create SecureBank Account</h2>

<form method="POST">

<input type="text"
name="name"
placeholder="Full Name"
required>

<input type="text"
name="username"
placeholder="Username"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<input type = "password"
name="pin"
placeholder="Create 4-digit PIN"
required>

<button type="submit">
Create Account
</button>

</form>

</div>

</body>
</html>
