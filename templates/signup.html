<!DOCTYPE html>
<html>
<head>
<title>Create SecureBank Account</title>

<style>

body{
background: linear-gradient(135deg,#1e3a8a,#2563eb);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{

background:white;
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
}

input{

width:100%;
padding:12px;
margin:10px 0;
}

button{

width:100%;
padding:12px;
background:#1e3a8a;
color:white;
border:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>🏦 Create SecureBank Account</h2>

<form method="POST">

<input type="text"
name="name"
placeholder="Full Name"
required>

<input type="text"
name="username"
placeholder="Username"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<input type = "password"
name="pin"
placeholder="Create 4-digit PIN"
required>

<button type="submit">
Create Account
</button>

</form>

</div>

</body>
</html>
